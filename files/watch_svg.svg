<!--?xml version="1.0" encoding="UTF-8"?-->
<svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="100%" height="100%" fill="#f2f2f2"></rect>

    <!-- Strap -->
    <rect x="130" y="20" width="40" height="180" rx="10" fill="#2c2c2c"></rect>

    <!-- Watch Bezel -->
    <circle cx="150" cy="110" r="70" fill="#c5a059" stroke="#9a7b41" stroke-width="3"></circle>
    <circle cx="150" cy="110" r="58" fill="#ffffff" stroke="#dddddd" stroke-width="2"></circle>

    <!-- Ticks -->
    <line x1="150" y1="55" x2="150" y2="65" stroke="#333" stroke-width="3"></line>
    <line x1="150" y1="155" x2="150" y2="165" stroke="#333" stroke-width="3"></line>
    <line x1="95" y1="110" x2="105" y2="110" stroke="#333" stroke-width="3"></line>
    <line x1="195" y1="110" x2="205" y2="110" stroke="#333" stroke-width="3"></line>

    <!-- Hands -->
    <line x1="150" y1="110" x2="150" y2="75" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"></line>
    <line x1="150" y1="110" x2="185" y2="110" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"></line>

    <circle cx="150" cy="110" r="4" fill="#1a1a1a"></circle>

    <!-- Color Options -->
    <!-- Gold -->
    <circle cx="80" cy="250" r="25" fill="#d4af37" stroke="#9a7b41" stroke-width="3"></circle>
    <text x="80" y="295" font-size="16" text-anchor="middle" fill="#333">Gold</text>

    <!-- Silver -->
    <circle cx="150" cy="250" r="25" fill="#cfd3d6" stroke="#9aa0a6" stroke-width="3"></circle>
    <text x="150" y="295" font-size="16" text-anchor="middle" fill="#333">Silver</text>

    <!-- Black -->
    <circle cx="220" cy="250" r="25" fill="#222" stroke="#000" stroke-width="3"></circle>
    <text x="220" y="295" font-size="16" text-anchor="middle" fill="#333">Black</text>

</svg>